name: colcon-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble]

    steps:
      - name: Install apt deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-${{ matrix.ros_distro }}-nav2-behavior-tree \
            ros-${{ matrix.ros_distro }}-nav2-msgs \
            ros-${{ matrix.ros_distro }}-behaviortree-cpp-v3 \
            ros-${{ matrix.ros_distro }}-tf2-geometry-msgs

      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: src/semantic_toponav_nav2_bt

      - name: Checkout upstream semantic-toponav (for semantic_toponav_msgs)
        uses: actions/checkout@v4
        with:
          repository: rsasaki0109/semantic-toponav
          ref: v1.0.0
          path: upstream

      - name: Stage semantic_toponav_msgs into the workspace
        run: |
          mkdir -p src/semantic_toponav_msgs
          cp -R upstream/ros2/semantic_toponav_msgs/. src/semantic_toponav_msgs/
          # Drop the upstream checkout so colcon doesn't find the
          # original copy of semantic_toponav_msgs and refuse to build
          # on duplicate package names.
          rm -rf upstream

      - name: Resolve rosdeps
        shell: bash
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y \
            --rosdistro ${{ matrix.ros_distro }}

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build --base-paths src \
            --packages-up-to semantic_toponav_nav2_bt \
            --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: colcon test
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test --base-paths src \
            --packages-select semantic_toponav_nav2_bt \
            --event-handlers console_direct+
          colcon test-result --verbose
